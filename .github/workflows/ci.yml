name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          uv pip install --system -r microservise/requirements.txt
          uv pip install --system pytest pytest-asyncio pytest-cov black flake8 ruff

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting tools
        run: |
          uv pip install --system black flake8 ruff

      - name: Run black
        run: black --check .

      - name: Run ruff
        run: ruff check .

      - name: Run flake8
        run: flake8 . --max-line-length=100 --exclude=.venv,__pycache__,airflow
