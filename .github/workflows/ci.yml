name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          uv pip install --system -r microservise/requirements.txt
          uv pip install --system pytest pytest-asyncio pytest-cov black flake8 ruff

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting tools
        run: |
          uv pip install --system black flake8 ruff

      - name: Run black (format check) - non fatal
        run: |
          black --check microservise/ || echo "⚠️ Black formatting issues found (non-fatal)"

      - name: Run ruff (linter) - non fatal
        run: |
          ruff check microservise/ || echo "⚠️ Ruff issues found (non-fatal)"

      - name: Run flake8 - non fatal
        run: |
          flake8 microservise/ --max-line-length=100 || echo "⚠️ Flake8 issues found (non-fatal)"
