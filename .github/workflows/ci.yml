name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          # Установка в систему (CI окружение) без виртуального окружения
          uv pip install --system -r microservise/requirements.txt
          uv pip install --system pytest pytest-asyncio pytest-cov black flake8 ruff

      # - name: Run tests with coverage
      #   run: |
      #     pytest --cov=. --cov-report=xml

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting tools
        run: |
          uv pip install --system black flake8 ruff

      - name: Run black (format check)
        run: black --check microservise/

      - name: Run ruff (linter)
        run: ruff check microservise/

      - name: Run flake8
        run: flake8 microservise/ --max-line-length=100
