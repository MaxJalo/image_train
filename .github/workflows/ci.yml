name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install dev dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-cov black flake8 ruff

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting tools
        run: |
          uv pip install black flake8 isort mypy pylint

      - name: Run isort
        run: isort --check-only --profile black core/ db/ models/ routes/ services/ app.py

      - name: Run black
        run: black --check core/ db/ models/ routes/ services/ app.py

      - name: Run mypy
        run: mypy core/ db/ models/ routes/ services/ app.py --ignore-missing-imports --allow-untyped-decorators --explicit-package-bases

      - name: Run flake8
        run: flake8 core/ db/ models/ routes/ services/ app.py --max-line-length=100

      - name: Run pylint
        run: pylint core/ db/ models/ routes/ services/ app.py --exit-zero
