name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies with uv
        run: |
          # Создание виртуального окружения
          uv venv --python 3.10

          # Установка зависимостей из requirements.txt
          uv pip install -r microservise/requirements.txt

          # Установка dev зависимостей
          uv pip install pytest pytest-asyncio pytest-cov black flake8

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting tools
        run: |
          uv pip install black flake8 ruff

      - name: Run black (format check)
        run: uv run black --check microservise/

      - name: Run ruff (linter)
        run: uv run ruff check microservise/

      - name: Run flake8
        run: uv run flake8 microservise/ --max-line-length=100

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: wagon-ml:test

      - name: Test Docker image
        run: |
          docker run --rm wagon-ml:test python -c "import torch; print('PyTorch OK')"
