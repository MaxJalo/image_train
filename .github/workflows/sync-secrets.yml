name: Sync Secrets via Airflow API
on: workflow_dispatch
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set MINIO_ENDPOINT
        run: |
          curl -X PUT "${{ secrets.AIRFLOW_URL }}/api/v1/variables/MINIO_ENDPOINT" \
            -u "${{ secrets.AIRFLOW_USER }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ secrets.MINIO_ENDPOINT }}"}'
      - name: Set MINIO_ACCESS_KEY
        run: |
          curl -X PUT "${{ secrets.AIRFLOW_URL }}/api/v1/variables/MINIO_ACCESS_KEY" \
            -u "${{ secrets.AIRFLOW_USER }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ secrets.MINIO_ACCESS_KEY }}"}'
      - name: Set MINIO_SECRET_KEY
        run: |
          curl -X PUT "${{ secrets.AIRFLOW_URL }}/api/v1/variables/MINIO_SECRET_KEY" \
            -u "${{ secrets.AIRFLOW_USER }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ secrets.MINIO_SECRET_KEY }}"}'
      - name: Set INPUT_BUCKET
        run: |
          curl -X PUT "${{ secrets.AIRFLOW_URL }}/api/v1/variables/INPUT_BUCKET" \
            -u "${{ secrets.AIRFLOW_USER }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ secrets.INPUT_BUCKET }}"}'
      - name: Set MARKER_BUCKET
        run: |
          curl -X PUT "${{ secrets.AIRFLOW_URL }}/api/v1/variables/MARKER_BUCKET" \
            -u "${{ secrets.AIRFLOW_USER }}:${{ secrets.AIRFLOW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d '{"value": "${{ secrets.MARKER_BUCKET }}"}'
