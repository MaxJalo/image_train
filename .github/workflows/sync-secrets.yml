name: Sync GitHub Secrets to Airflow

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set Airflow variables via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Проверка длин секретов ==="
            echo "MINIO_ENDPOINT length: ${#MINIO_ENDPOINT}"
            echo "MINIO_ACCESS_KEY length: ${#MINIO_ACCESS_KEY}"
            echo "MINIO_SECRET_KEY length: ${#MINIO_SECRET_KEY}"
            echo "INPUT_BUCKET length: ${#INPUT_BUCKET}"
            echo "MARKER_BUCKET length: ${#MARKER_BUCKET}"
            echo "=== Удаляем старые переменные (если есть) ==="
            docker exec airflow-airflow-webserver-1 airflow variables delete MINIO_ENDPOINT || echo "MINIO_ENDPOINT not found"
            docker exec airflow-airflow-webserver-1 airflow variables delete MINIO_ACCESS_KEY || echo "MINIO_ACCESS_KEY not found"
            docker exec airflow-airflow-webserver-1 airflow variables delete MINIO_SECRET_KEY || echo "MINIO_SECRET_KEY not found"
            docker exec airflow-airflow-webserver-1 airflow variables delete INPUT_BUCKET || echo "INPUT_BUCKET not found"
            docker exec airflow-airflow-webserver-1 airflow variables delete MARKER_BUCKET || echo "MARKER_BUCKET not found"
            
            echo "=== Устанавливаем новые переменные ==="
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ENDPOINT "${{ secrets.MINIO_ENDPOINT }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ACCESS_KEY "${{ secrets.MINIO_ACCESS_KEY }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_SECRET_KEY "${{ secrets.MINIO_SECRET_KEY }}"
            docker exec airflow-airflow-webserver-1 airflow variables set INPUT_BUCKET "${{ secrets.INPUT_BUCKET }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MARKER_BUCKET "${{ secrets.MARKER_BUCKET }}"
            
            echo "=== Проверяем результат ==="
            docker exec airflow-airflow-webserver-1 airflow variables list
