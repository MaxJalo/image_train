name: Debug SSH and Airflow

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Debug
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== 1. Текущая дата и время ==="
            date
            echo "=== 2. Список всех контейнеров Docker ==="
            docker ps -a
            echo "=== 3. Проверка, существует ли контейнер airflow-airflow-webserver-1 ==="
            docker inspect airflow-airflow-webserver-1 > /dev/null 2>&1 && echo "Контейнер существует" || echo "Контейнер НЕ найден"
            echo "=== 4. Версия Airflow внутри контейнера ==="
            docker exec airflow-airflow-webserver-1 airflow version || echo "Ошибка: не удалось выполнить airflow version"
            echo "=== 5. Попытка установить переменную MINIO_ENDPOINT ==="
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ENDPOINT "http://example.com:9000"
            echo "=== 6. Проверка, что переменная установлена ==="
            docker exec airflow-airflow-webserver-1 airflow variables get MINIO_ENDPOINT || echo "Переменная не найдена"
            echo "=== 7. Список всех переменных Airflow (первые 10) ==="
            docker exec airflow-airflow-webserver-1 airflow variables list | head -10
            echo "=== 8. Завершение ==="
