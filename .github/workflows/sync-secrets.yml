name: Sync GitHub Secrets to Airflow
on: workflow_dispatch
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set Airflow variables via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ENDPOINT "${{ secrets.MINIO_ENDPOINT }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ACCESS_KEY "${{ secrets.MINIO_ACCESS_KEY }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_SECRET_KEY "${{ secrets.MINIO_SECRET_KEY }}"
            docker exec airflow-airflow-webserver-1 airflow variables set INPUT_BUCKET "${{ secrets.INPUT_BUCKET }}"
            docker exec airflow-airflow-webserver-1 airflow variables set MARKER_BUCKET "${{ secrets.MARKER_BUCKET }}"
