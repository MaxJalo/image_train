name: Sync GitHub Secrets to Airflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          echo "MINIO_ENDPOINT length: ${{ secrets.MINIO_ENDPOINT }}"
          echo "MINIO_ACCESS_KEY length: ${{ secrets.MINIO_ACCESS_KEY }}"
          echo "MINIO_SECRET_KEY length: ${{ secrets.MINIO_SECRET_KEY }}"
          echo "INPUT_BUCKET length: ${{ secrets.INPUT_BUCKET }}"
          echo "MARKER_BUCKET length: ${{ secrets.MARKER_BUCKET }}"
