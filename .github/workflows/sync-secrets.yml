name: Test SSH Connection
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: SSH to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Список контейнеров ==="
            docker ps --format "table {{.Names}}"
            echo "=== Проверка airflow внутри контейнера ==="
            docker exec airflow-airflow-webserver-1 which airflow || echo "airflow not found in PATH"
            echo "=== Попытка установить переменную ==="
            docker exec airflow-airflow-webserver-1 airflow variables set TEST_VAR "test_value"
            echo "=== Проверка, что переменная установилась ==="
            docker exec airflow-airflow-webserver-1 airflow variables get TEST_VAR
