name: Sync GitHub Secrets to Airflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set Airflow variables via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Список контейнеров ==="
            docker ps --format "table {{.Names}}"
            echo "=== Проверка команды airflow внутри контейнера ==="
            docker exec airflow-airflow-webserver-1 airflow version
            echo "=== Установка переменной MINIO_ENDPOINT ==="
            docker exec airflow-airflow-webserver-1 airflow variables set MINIO_ENDPOINT "${{ secrets.MINIO_ENDPOINT }}"
            echo "=== Проверка, что переменная установлена ==="
            docker exec airflow-airflow-webserver-1 airflow variables get MINIO_ENDPOINT
