services:
  api:
    image: image-train-api:cuda
    container_name: image-train-api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_USER=root
      - MONGODB_PASSWORD=example
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - DATABASE_NAME=wagon_db
      - MODEL1_PATH=/app/NN_models/model-1.pt
      - MODEL2_PATH=/app/NN_models/model-2.pt
      - OUTPUT_MODEL1_PATH=/app/results
      - LOG_LEVEL=INFO
      - API_TITLE=Wagon ML API
      - API_VERSION=1.0.0
      - DEBUG=false
      - MAX_UPLOAD_SIZE=52428800
      - MODEL_TIMEOUT=30
    volumes:
      - ./results:/app/results
      - ./NN_models:/app/NN_models
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - wagon-network
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: wagon-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_DATABASE=wagon_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - wagon-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  wagon-network:
    driver: bridge
