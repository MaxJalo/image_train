[pytest]
# Pytest configuration

# Минимальная версия Python
minversion = 7.0

# Папки для поиска тестов
testpaths = tests

# Шаблоны имён файлов тестов
python_files = test_*.py *_test.py

# Шаблоны имён классов тестов
python_classes = Test*

# Шаблоны имён функций тестов
python_functions = test_*

# Опции командной строки по умолчанию
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Маркеры
markers =
    unit: Unit tests for individual components
    integration: Integration tests combining multiple components
    slow: Tests that run slowly
    skip_ci: Skip this test in CI environment

# Игнорировать советы
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
